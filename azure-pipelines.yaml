trigger:
  branches:
    include:
    - main
    - develop
    - support/*
pr:
  branches:
    include:
    - develop

name: $(Date:yyyyMMdd)$(Rev:-rr)

resources:
  repositories:
    - repository: templates
      type: github
      name: UiPath/AzurePipelinesTemplates
      ref: refs/tags/uipath.package-signing.2.0.6
      endpoint: UiPath

variables:
- template: .pipelines/vars.yml

stages:
- stage: BuildAndTest
  jobs:
  - template: .pipelines/build.yaml

- stage: ReleaseInternal
  condition: and(succeeded(), or(eq(variables['Build.SourceBranch'], 'refs/heads/develop'), startsWith(variables['Build.SourceBranch'], 'refs/heads/support/')))
  dependsOn: BuildAndTest
  jobs:
  - template: .pipelines/release.yaml
    parameters:
      type: internal

- stage: ReleasePublic
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  dependsOn: BuildAndTest
  jobs:
  - template: .pipelines/release.yaml
    parameters:
      type: public
